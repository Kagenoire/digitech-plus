name: digitech_plus
description: "Digitech+ - Smart companion untuk mahasiswa Universitas Teknologi Digital"
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  html: ^0.15.4
  flutter_secure_storage: ^9.2.2
  webview_flutter: ^4.10.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.9.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/digiplus.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/digiplus.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/digiplus.png
